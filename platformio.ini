; PlatformIO Configuration for Electricity Price Dashboard
; Board: Cheap Yellow Display (ESP32-2432S028R)

[env:cyd]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
board_build.partitions = min_spiffs.csv
board_build.filesystem = littlefs

lib_deps =
    bodmer/TFT_eSPI@^2.5.0
    bblanchon/ArduinoJson@^7.0.0

build_flags =
    -DUSER_SETUP_LOADED=1
    ; ILI9341 driver for CYD
    -DILI9341_DRIVER=1
    -DTFT_WIDTH=240
    -DTFT_HEIGHT=320
    ; CYD SPI pin mapping
    -DTFT_MOSI=13
    -DTFT_SCLK=14
    -DTFT_CS=15
    -DTFT_DC=2
    -DTFT_RST=-1
    -DTFT_BL=21
    ; Touch
    -DTOUCH_CS=33
    ; SPI frequencies
    -DSPI_FREQUENCY=55000000
    -DSPI_READ_FREQUENCY=20000000
    -DSPI_TOUCH_FREQUENCY=2500000

