; PlatformIO Configuration for Electricity Price Dashboard
; Board: Cheap Yellow Display (ESP32-2432S028R)

[env:cyd]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
board_build.partitions = min_spiffs.csv
board_build.filesystem = littlefs

lib_deps =
    bodmer/TFT_eSPI@^2.5.0
    bblanchon/ArduinoJson@^7.0.0
    https://github.com/PaulStoffregen/XPT2046_Touchscreen.git

build_flags =
    -Iinclude
    -DUSER_SETUP_LOADED=1
    -DILI9341_2_DRIVER=1
    -DTFT_WIDTH=240
    -DTFT_HEIGHT=320
    -DTFT_INVERSION_ON=1
    -DTFT_MISO=12
    -DTFT_MOSI=13
    -DTFT_SCLK=14
    -DTFT_CS=15
    -DTFT_DC=2
    -DTFT_RST=-1
    -DTFT_BL=21
    ; NO TOUCH_CS here — touch is on separate HSPI, handled by XPT2046_Touchscreen lib
    ; Fonts – LOAD_GLCD is the default 8px Adafruit font used by setTextSize()
    -DLOAD_GLCD=1
    -DLOAD_FONT2=1
    -DLOAD_FONT4=1
    -DLOAD_GFXFF=1
    ; SPI frequencies
    -DSPI_FREQUENCY=55000000
    -DSPI_READ_FREQUENCY=20000000
    -DSPI_TOUCH_FREQUENCY=2500000
    -DCORE_DEBUG_LEVEL=3

